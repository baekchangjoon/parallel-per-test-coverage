name: jacoco-version-canary

# The probe hook depends on jacoco-core internal class/field/method names. Because we EMBED a
# pinned jacoco-core, drift only happens when we bump it — so this canary runs weekly (and on
# demand) across a small matrix and fails fast if an upgrade breaks the hook.
on:
  schedule:
    - cron: "0 6 * * 1"      # Mondays 06:00 UTC
  workflow_dispatch: {}

jobs:
  canary:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jacoco: ["0.8.11", "0.8.12", "0.8.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Golden equivalence + e2e against JaCoCo ${{ matrix.jacoco }}
        run: ./gradlew -PjacocoVersion=${{ matrix.jacoco }} integrationTest e2eTest
