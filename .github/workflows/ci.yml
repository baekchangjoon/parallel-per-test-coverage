name: ci

# Full suite across the JDK x JUnit matrix on every PR to main and every push/merge to main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build + run everything on each modern JDK; the condy fixture's bytecode level tracks the JDK so the
  # CondyProbeArrayStrategy (Java 11+) path is exercised at 11/17/21. JUnit 4 and 5 are both covered by
  # the testkit-junit4 / testkit-junit5 module tests.
  gradle:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jdk: ["11", "17", "21"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
          cache: gradle
      - name: Build + test (all modules + agent e2e suites)
        run: >
          ./gradlew --no-daemon
          test
          :agent:integrationTest :agent:e2eTest :agent:e2eJakartaTest :agent:e2eCondyTest
          :agent:jacocoTestReport
          -PcondyRelease=${{ matrix.jdk }}
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-jdk${{ matrix.jdk }}
          path: |
            **/build/reports/tests/
            agent/build/reports/jacoco/
          if-no-files-found: ignore
          retention-days: 14

  # Java 8 runtime compatibility of the dependency artifacts users add (the testkit). Gradle runs on a
  # modern JDK; the test JVMs fork on JDK 8 via a toolchain (foojay-provisioned). The agent/junit5 test
  # harnesses use Mockito 5 (Java 11+) so they are not run here; their Java 8 source compatibility is
  # enforced by sourceCompatibility and exercised on the matrix above.
  jdk8-compat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17 (runs Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Run testkit tests on a JDK 8 toolchain
        run: >
          ./gradlew --no-daemon
          :testkit-core:test :testkit-junit4:test :testkit-restassured:test
          -PtestJavaVersion=8

  # AC1 + AC4: the standalone Gradle consumer — a parallel REST Assured suite (JUnit 5) and a JUnit 4
  # suite (Vintage), both via the plugin + testkit, producing one .exec per test.
  gradle-sample:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Publish plugin + agent + testkit to mavenLocal
        run: >
          ./gradlew --no-daemon
          :agent:publishToMavenLocal
          :testkit-core:publishToMavenLocal :testkit-junit5:publishToMavenLocal
          :testkit-junit4:publishToMavenLocal :testkit-restassured:publishToMavenLocal
          :gradle-plugin:publishToMavenLocal
      - name: Run the gradle sample (parallel REST Assured + JUnit 4)
        run: ./gradlew --no-daemon -p samples/gradle-sample test
      - name: Assert per-test coverage + isolation
        run: |
          # The two parallel REST Assured tests hit DIFFERENT SUT classes (Alpha vs Beta), so
          # classCount=1 each proves no cross-contamination: a leak would make the absorbing test's
          # .exec record both classes (classCount=2).
          # testIds are FQCN#method (black-box adapters emit the fully-qualified class name, REQ-014).
          for t in "com.sample.OwnerRestAssuredIT#alphaOnly" "com.sample.OwnerRestAssuredIT#betaOnly" "com.sample.AlphaJUnit4Test#hitsAlpha"; do
            test -s "samples/gradle-sample/build/pjacoco/$t.exec" \
              || { echo "::error::missing $t.exec"; exit 1; }
            grep -q '"classCount":1' "samples/gradle-sample/build/pjacoco/$t.json" \
              || { echo "::error::$t did not record exactly its own SUT class (isolation/routing failure)"; exit 1; }
          done

  # AC3: the Maven plugin + the maven-sample consumer, end-to-end, against locally published artifacts.
  maven-sample:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        jdk: ["11", "17", "21"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.jdk }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
          cache: gradle
      - name: Publish agent + testkit to mavenLocal
        run: ./gradlew --no-daemon :agent:publishToMavenLocal :testkit-core:publishToMavenLocal
      - name: Install the maven plugin
        run: mvn -B -f maven-plugin/pom.xml install -DskipTests
      - name: Run the maven sample (produces per-test .exec)
        run: mvn -B -f samples/maven-sample/pom.xml test
      - name: Assert per-test coverage was produced
        run: |
          test -s samples/maven-sample/target/pjacoco/T1.exec \
            || { echo "::error::maven-sample did not produce T1.exec"; exit 1; }
          grep -q '"classCount":1' samples/maven-sample/target/pjacoco/T1.json \
            || { echo "::error::T1 did not record Calc coverage"; exit 1; }
