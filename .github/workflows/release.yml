name: release

# One-click release: builds the shaded agent jar, tags the commit, and publishes a
# GitHub Release with the jar + its SHA-256 checksum attached.
#
# How to run (web UI): repo → Actions → "release" → "Run workflow".
#   - version: leave blank to use the version from build.gradle.kts, or type e.g. 0.2.0 to override.
#   - prerelease: tick to mark the release as a pre-release.
# The tag created is "v<version>" on the selected branch (default: the branch you dispatch from).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (blank = read from build.gradle.kts). Tag will be v<version>."
        required: false
        type: string
      prerelease:
        description: "Mark this release as a pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # needed to create the tag and the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # Untrusted input (the dispatcher-typed version) is passed via env, never interpolated
      # into the shell, and validated against a strict pattern before any further use.
      - name: Resolve release version
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$INPUT_VERSION"
          if [ -z "$VERSION" ]; then
            # Ask Gradle for the resolved project version (single source of truth in build.gradle.kts).
            VERSION=$(./gradlew -q --no-daemon properties | awk -F': ' '/^version: /{print $2}')
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine a version (input empty and none found in build.gradle.kts)."
            exit 1
          fi
          if ! printf '%s' "$VERSION" | grep -qE '^[A-Za-z0-9._+-]+$'; then
            echo "::error::Invalid version '$VERSION' — only letters, digits, and . _ + - are allowed."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"   >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION (tag v$VERSION)"

      - name: Fail if tag already exists
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Bump the version in build.gradle.kts or pass a new version input."
            exit 1
          fi

      # P1-2 guard: the released version MUST equal the source default in build.gradle.kts, so that anyone
      # who clones this tag and builds (e.g. publishToMavenLocal from the tag commit) produces the SAME
      # version as the release artifacts. A workflow `version` input that differs from the committed source
      # default would tag a commit whose source still says the old version — a silent version skew.
      - name: Verify source version matches the release version
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          SOURCE_VERSION="$(./gradlew -q --no-daemon properties | awk -F': ' '/^version: /{print $2}')"
          if [ "$SOURCE_VERSION" != "$VERSION" ]; then
            echo "::error::Release version '$VERSION' != build.gradle.kts source version '$SOURCE_VERSION'. Bump the source default (and the consumable refs per docs/RELEASING.md) to '$VERSION' and commit it on this ref before releasing, so a tag-clone build produces matching artifacts."
            exit 1
          fi
          echo "Source version matches release version: $VERSION"

      - name: Build + test the release artifacts
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          # Agent (shaded, tested) + testkit jars to the local Maven repo (named by artifactId).
          ./gradlew --no-daemon "-PreleaseVersion=$VERSION" \
            :agent:test :agent:shadowJar \
            :agent:publishToMavenLocal \
            :testkit-core:publishToMavenLocal :testkit-junit5:publishToMavenLocal \
            :testkit-junit4:publishToMavenLocal :testkit-restassured:publishToMavenLocal
          # Maven plugin jar (resolves io.pjacoco:pjacoco-agent:$VERSION from the mavenLocal step above).
          mvn -B -ntp -f maven-plugin/pom.xml -DskipTests "-Dpjacoco.agent.version=$VERSION" package

      - name: Stage versioned artifacts
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p dist
          M2="$HOME/.m2/repository/io/pjacoco"
          # Agent shaded jar (the build output is the same artifact published as io.pjacoco:pjacoco-agent).
          cp "agent/build/libs/pjacoco-agent.jar" "dist/pjacoco-agent-${VERSION}.jar"
          # Testkit jars from mavenLocal (artifactId-named).
          for a in pjacoco-testkit pjacoco-testkit-junit5 pjacoco-testkit-junit4 pjacoco-testkit-restassured; do
            cp "$M2/$a/${VERSION}/$a-${VERSION}.jar" "dist/$a-${VERSION}.jar"
          done
          # Maven plugin jar from the Maven build.
          cp "maven-plugin/target/pjacoco-maven-plugin-${VERSION}.jar" "dist/pjacoco-maven-plugin-${VERSION}.jar"
          # Checksums for every staged jar.
          ( cd dist && for j in *.jar; do sha256sum "$j" > "$j.sha256"; done )
          echo "Staged artifacts:"; ls -1 dist
          count="$(ls dist/*.jar | wc -l | tr -d ' ')"
          test "$count" -eq 6 || { echo "::error::expected 6 jars (agent + 4 testkit + maven-plugin), staged $count."; exit 1; }

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          TARGET_SHA: ${{ github.sha }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then PRERELEASE_FLAG="--prerelease"; fi
          gh release create "$TAG" \
            dist/*.jar dist/*.jar.sha256 \
            --target "$TARGET_SHA" \
            --title "v${VERSION}" \
            --generate-notes \
            $PRERELEASE_FLAG

      - name: Job summary
        if: always()
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.ver.outputs.tag }}
        run: |
          {
            echo "## Release"
            if [ -n "$TAG" ]; then
              echo ""
              echo "- Tag: \`$TAG\`"
              echo "- Assets (each + \`.sha256\`):"
              echo "  - \`pjacoco-agent-${VERSION}.jar\`"
              echo "  - \`pjacoco-testkit-${VERSION}.jar\`, \`pjacoco-testkit-junit5-${VERSION}.jar\`, \`pjacoco-testkit-junit4-${VERSION}.jar\`, \`pjacoco-testkit-restassured-${VERSION}.jar\`"
              echo "  - \`pjacoco-maven-plugin-${VERSION}.jar\`"
              echo "- Release: $RELEASE_URL"
            else
              echo ""
              echo "_Release failed before a version was resolved._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
