name: release

# One-click release: builds the shaded agent jar, tags the commit, and publishes a
# GitHub Release with the jar + its SHA-256 checksum attached.
#
# How to run (web UI): repo → Actions → "release" → "Run workflow".
#   - version: leave blank to use the version from build.gradle.kts, or type e.g. 0.2.0 to override.
#   - prerelease: tick to mark the release as a pre-release.
# The tag created is "v<version>" on the selected branch (default: the branch you dispatch from).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (blank = read from build.gradle.kts). Tag will be v<version>."
        required: false
        type: string
      prerelease:
        description: "Mark this release as a pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write   # needed to create the tag and the GitHub Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # Untrusted input (the dispatcher-typed version) is passed via env, never interpolated
      # into the shell, and validated against a strict pattern before any further use.
      - name: Resolve release version
        id: ver
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$INPUT_VERSION"
          if [ -z "$VERSION" ]; then
            # Ask Gradle for the resolved project version (single source of truth in build.gradle.kts).
            VERSION=$(./gradlew -q --no-daemon properties | awk -F': ' '/^version: /{print $2}')
          fi
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine a version (input empty and none found in build.gradle.kts)."
            exit 1
          fi
          if ! printf '%s' "$VERSION" | grep -qE '^[A-Za-z0-9._+-]+$'; then
            echo "::error::Invalid version '$VERSION' — only letters, digits, and . _ + - are allowed."
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"   >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION (tag v$VERSION)"

      - name: Fail if tag already exists
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Bump the version in build.gradle.kts or pass a new version input."
            exit 1
          fi

      - name: Build + test the agent jar
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: ./gradlew --no-daemon "-PreleaseVersion=$VERSION" test shadowJar

      - name: Stage versioned artifacts
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          SRC=build/libs/jacocoagent-parallel.jar
          test -f "$SRC" || { echo "::error::Expected $SRC was not produced by shadowJar."; exit 1; }
          mkdir -p dist
          cp "$SRC" "dist/jacocoagent-parallel-${VERSION}.jar"
          ( cd dist && sha256sum "jacocoagent-parallel-${VERSION}.jar" > "jacocoagent-parallel-${VERSION}.jar.sha256" )

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          TARGET_SHA: ${{ github.sha }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then PRERELEASE_FLAG="--prerelease"; fi
          gh release create "$TAG" \
            "dist/jacocoagent-parallel-${VERSION}.jar" \
            "dist/jacocoagent-parallel-${VERSION}.jar.sha256" \
            --target "$TARGET_SHA" \
            --title "v${VERSION}" \
            --generate-notes \
            $PRERELEASE_FLAG

      - name: Job summary
        if: always()
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
          RELEASE_URL: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.ver.outputs.tag }}
        run: |
          {
            echo "## Release"
            if [ -n "$TAG" ]; then
              echo ""
              echo "- Tag: \`$TAG\`"
              echo "- Asset: \`jacocoagent-parallel-${VERSION}.jar\` (+ \`.sha256\`)"
              echo "- Release: $RELEASE_URL"
            else
              echo ""
              echo "_Release failed before a version was resolved._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
